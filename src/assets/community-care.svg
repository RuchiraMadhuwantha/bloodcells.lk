<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Community care illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="55%" stop-color="#fecaca"/>
      <stop offset="100%" stop-color="#fca5a5"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- soft circles -->
  <circle cx="120" cy="80" r="70" fill="#ffffff" opacity="0.35"/>
  <circle cx="700" cy="380" r="90" fill="#ffffff" opacity="0.30"/>
  <circle cx="640" cy="70" r="40" fill="#ffffff" opacity="0.40"/>

  <!-- central blood drop -->
  <path d="M400 120 C400 120 330 210 330 270 a70 70 0 1 0 140 0 C470 210 400 120 400 120 Z" fill="url(#drop)"/>
  <path d="M372 300 a28 28 0 0 1 28 -28" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

  <!-- people / community -->
  <g fill="#ffffff" opacity="0.95">
    <circle cx="250" cy="330" r="26"/>
    <rect x="218" y="356" width="64" height="54" rx="22"/>
    <circle cx="550" cy="330" r="26"/>
    <rect x="518" y="356" width="64" height="54" rx="22"/>
  </g>
  <g fill="#b91c1c" opacity="0.85">
    <circle cx="400" cy="360" r="30"/>
    <rect x="362" y="390" width="76" height="60" rx="26"/>
  </g>

  <!-- heart connection -->
  <path d="M250 300 q40 -40 80 -10 q40 -30 80 10" fill="none" stroke="#b91c1c" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 14" opacity="0.8"/>
</svg>
